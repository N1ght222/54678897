<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love You</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0610;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  #scene {
    position: relative;
    width: 700px;
    height: 660px;
  }
  .word {
    position: absolute;
    white-space: nowrap;
    pointer-events: none;
    font-family: 'Georgia', serif;
    font-style: italic;
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 0.03em;
    transform-origin: left center;
  }
</style>
</head>
<body>
<div id="scene"></div>
<script>
const scene = document.getElementById('scene');
const W = 700, H = 660;
const CX = W * 0.46;
const CY = H * 0.50;
const SCALE = 24;

// Heart parametric
function heartXY(t) {
  const x = CX + SCALE * 16 * Math.pow(Math.sin(t), 3);
  const y = CY - SCALE * (13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));
  return { x, y };
}

// Build arc-length table
const STEPS = 4000;
const arc = [];
let total = 0;
let prev = heartXY(0);
arc.push({ x: prev.x, y: prev.y, len: 0 });
for (let i = 1; i <= STEPS; i++) {
  const t = (i / STEPS) * Math.PI * 2;
  const p = heartXY(t);
  const d = Math.hypot(p.x - prev.x, p.y - prev.y);
  total += d;
  arc.push({ x: p.x, y: p.y, len: total });
  prev = p;
}

function posAt(frac) {
  frac = ((frac % 1) + 1) % 1;
  const target = frac * total;
  let lo = 0, hi = arc.length - 1;
  while (lo < hi - 1) {
    const m = (lo + hi) >> 1;
    arc[m].len < target ? lo = m : hi = m;
  }
  const a = arc[lo], b = arc[hi];
  const f = b.len > a.len ? (target - a.len) / (b.len - a.len) : 0;
  return { x: a.x + (b.x - a.x) * f, y: a.y + (b.y - a.y) * f };
}

// Find bottom tip (max y on screen)
let bottomFrac = 0, maxY = -Infinity;
for (let i = 0; i < arc.length; i++) {
  if (arc[i].y > maxY) { maxY = arc[i].y; bottomFrac = arc[i].len / total; }
}

// --- Params that match the photo ---
// • All same font size (15px)
// • Queue of ~50 labels
// • Born at bottom, travel counter-clockwise (decreasing frac = going left side up)
//   Looking at photo: left side goes DOWN (text goes bottom→up on left, bottom→up on right)
//   Actually the photo shows: from bottom tip, texts go UP the LEFT side,
//   then along the top bumps, then DOWN the right side — counter-clockwise when viewed
//   BUT in our coord system (y flips): let's check.
//   Heart t=0 → top right. Increasing t → goes right bump top → right side down → bottom → left side up → left bump top → back
//   So INCREASING t (arc frac) = clockwise visually.
//   Photo: born at bottom, travels UP the LEFT side = counter-clockwise = DECREASING arc frac.
// • Gap before start: ~30px worth of arc

const N = 110;           // number of labels in the queue
const GAP_PX = 32;      // invisible gap before birth point
const GAP_FRAC = GAP_PX / total;
const TRAVEL = 1 - GAP_FRAC;    // how far they go (almost full circle)
const SPACING = TRAVEL / N;     // arc spacing between consecutive labels
const SPEED = 0.07;             // arc fractions per second (counter-clockwise = negative direction)

// Pre-create DOM elements
const els = [];
for (let i = 0; i < N; i++) {
  const el = document.createElement('div');
  el.className = 'word';
  el.textContent = 'I love you';
  scene.appendChild(el);
  els.push(el);
}

let last = null;
let head = bottomFrac; // head = newest/brightest particle, at birth point

function animate(ts) {
  if (!last) last = ts;
  const dt = Math.min((ts - last) / 1000, 0.05);
  last = ts;

  // Move counter-clockwise: subtract from frac
  head -= SPEED * dt;

  for (let i = 0; i < N; i++) {
    // i=0: head (brightest, just born at bottom)
    // i=N-1: tail (dimmest, furthest along path)
    const frac = ((head + i * SPACING) % 1 + 1) % 1;

    // Distance this particle has traveled from birth point
    let traveled = bottomFrac - frac;
    if (traveled < 0) traveled += 1;

    // Is it in the dead zone? (hasn't been born yet or past disappear point)
    const alive = traveled <= TRAVEL;
    if (!alive) {
      els[i].style.opacity = 0;
      continue;
    }

    const { x, y } = posAt(frac);

    // Opacity: head=1.0, fades linearly to 0 at tail
    // Extra soft fade-out in last 8% of travel
    let t_norm = traveled / TRAVEL; // 0 = just born, 1 = about to die
    let opacity = 1 - t_norm;       // linear fade: head bright, tail dark

    // Smooth death near end
    if (t_norm > 0.90) {
      opacity *= (1 - (t_norm - 0.90) / 0.10);
    }

    opacity = Math.max(0, Math.min(1, opacity));

    els[i].style.opacity = opacity;
    // Left-align: position is left edge of text
    els[i].style.left = x + 'px';
    els[i].style.top  = y + 'px';
    // transform: keep horizontal, anchor left-center like the photo
    els[i].style.transform = 'translateY(-50%)';

    // Color stays consistent pink, just opacity changes (matching photo)
    els[i].style.color = '#ffb3c1';
    if (opacity > 0.5) {
      els[i].style.textShadow = `0 0 5px rgba(255,60,100,0.7), 0 0 12px rgba(255,20,70,0.35)`;
    } else if (opacity > 0.15) {
      els[i].style.textShadow = `0 0 4px rgba(255,60,100,0.4)`;
    } else {
      els[i].style.textShadow = 'none';
    }
  }

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
